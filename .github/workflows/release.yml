name: Release Binaries

on:
  push:
    tags:
      - '*.*.*'
jobs:
  build:
    name: Build binaries for ${{ matrix.goos }} / ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64  # 跳过不常用组合

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.3'  # 根据你的项目选择 Go 版本

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
          BIN_DIR: ${{ github.workspace }}/dist
        run: |
          mkdir -p dist
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi

          OUTPUT="dist/jcli${ext}" ./scripts/build.sh
          cd dist && zip "jcli-${GOOS}-${GOARCH}.zip" "jcli${ext}"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.zip
          body: |
            ## jenkins-cli ${{ github.ref_name }}

            **Version:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Build Date:** ${{ github.event.head_commit.timestamp }}

            ### Downloads
            Choose the appropriate binary for your platform below.
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
