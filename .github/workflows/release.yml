name: Release Binaries

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }} / ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then
            ext=".exe"
          fi

          artifact="jcli-${GOOS}-${GOARCH}"
          output="dist/${artifact}/jcli${ext}"

          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" OUTPUT="$output" ./scripts/build.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: jcli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/jcli-${{ matrix.goos }}-${{ matrix.goarch }}/
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !github.event.act }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Package release archives
        run: |
          for dir in dist/*; do
            [ -d "$dir" ] || continue

            artifact="$(basename "$dir")"
            binary="$(find "$dir" -maxdepth 1 -type f | head -n 1)"

            if [ -z "$binary" ]; then
              echo "No binary found in $dir" >&2
              exit 1
            fi

            (
              cd "$dir"
              zip "../${artifact}.zip" "$(basename "$binary")"
            )
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          body: |
            ## jenkins-cli ${{ github.ref_name }}

            **Version:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
