name: Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  prepare:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
      on_main: ${{ steps.main.outputs.value }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          version="${GITHUB_REF_NAME}"
          if ! printf '%s\n' "$version" | grep -Eq '^v[0-9]+\.[0-9]+(\.[0-9]+)?$'; then
            version=""
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Check tag commit is on main
        id: main
        run: |
          tag_commit="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          if [ -z "$tag_commit" ]; then
            echo "value=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          main_ref=""
          if git show-ref --verify --quiet refs/remotes/origin/main; then
            main_ref="refs/remotes/origin/main"
          elif git show-ref --verify --quiet refs/heads/main; then
            main_ref="refs/heads/main"
          fi

          if [ -z "$main_ref" ]; then
            echo "value=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git merge-base --is-ancestor "$tag_commit" "$main_ref"; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Debug prepare outputs
        run: |
          echo "GITHUB_REF=$GITHUB_REF"
          echo "GITHUB_REF_NAME=$GITHUB_REF_NAME"
          echo "GITHUB_SHA=$GITHUB_SHA"
          echo "version=${{ steps.version.outputs.value }}"
          echo "on_main=${{ steps.main.outputs.value }}"
          echo "tag_commit=$(git rev-list -n 1 "$GITHUB_REF_NAME" || true)"
          if git show-ref --verify --quiet refs/remotes/origin/main; then
            echo "main_ref=refs/remotes/origin/main"
            echo "main_sha=$(git rev-parse refs/remotes/origin/main)"
          elif git show-ref --verify --quiet refs/heads/main; then
            echo "main_ref=refs/heads/main"
            echo "main_sha=$(git rev-parse refs/heads/main)"
          else
            echo "main_ref="
          fi

  build:
    name: Build ${{ matrix.goos }} / ${{ matrix.goarch }}
    needs: prepare
    if: ${{ needs.prepare.outputs.version != '' && needs.prepare.outputs.on_main == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.prepare.outputs.version }}
          COMMIT: ${{ github.sha }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then
            ext=".exe"
          fi

          artifact="jcli-${GOOS}-${GOARCH}"
          output="dist/${artifact}/jcli${ext}"

          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" OUTPUT="$output" ./scripts/build.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: jcli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/jcli-${{ matrix.goos }}-${{ matrix.goarch }}/
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    if: ${{ !github.event.act && needs.prepare.outputs.version != '' && needs.prepare.outputs.on_main == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Package release archives
        run: |
          for dir in dist/*; do
            [ -d "$dir" ] || continue

            artifact="$(basename "$dir")"
            binary="$(find "$dir" -maxdepth 1 -type f | head -n 1)"

            if [ -z "$binary" ]; then
              echo "No binary found in $dir" >&2
              exit 1
            fi

            (
              cd "$dir"
              zip "../${artifact}.zip" "$(basename "$binary")"
            )
          done

      - name: Generate release notes
        run: |
          current_tag="${{ needs.prepare.outputs.version }}"

          previous_tag="$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+(\.[0-9]+)?$' | grep -Fxv "$current_tag" | head -n 1 || true)"

          {
            echo "## jenkins-cli ${current_tag}"
            echo
            echo "**Version:** ${current_tag}"
            if [ -n "$previous_tag" ]; then
              echo "**Changes Since:** ${previous_tag}"
              echo
              git log --no-merges --pretty='- %s (%h)' "${previous_tag}..${current_tag}"
            else
              echo
              echo "Initial tagged release."
              echo
              git log --no-merges --pretty='- %s (%h)' "${current_tag}"
            fi
          } > release-notes.md

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          body_path: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
